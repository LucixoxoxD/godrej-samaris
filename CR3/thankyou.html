  <style>
    :root {
      --bg: #0d0d0e;
      --text: #f5f0e8;
      --muted: rgba(245,240,232,.72);
      --gold: #d7b56d;
      --gold2: #b88d41;
      --line: rgba(255,255,255,.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }
    .logo {
      font-size: .78rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 48px;
    }
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: pop .4s ease;
    }
    @keyframes pop {
      0%   { transform: scale(.6); opacity: 0; }
      80%  { transform: scale(1.1); }
      100% { transform: scale(1);  opacity: 1; }
    }
    .check-circle svg { width: 32px; height: 32px; stroke: var(--gold); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.15;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 40px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 40px;
      opacity: .5;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 999px;
      border: 1px solid rgba(215,181,109,.45);
      background: transparent;
      color: var(--text);
      font-size: .82rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .btn:hover {
      background: rgba(215,181,109,.1);
      border-color: var(--gold);
      transform: translateY(-2px);
    }
    .btn.gold {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      border-color: transparent;
      color: #1a1200;
      font-weight: 600;
    }
    .btn.gold:hover {
      background: linear-gradient(135deg, #e5c87e, var(--gold));
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .footer-note {
      margin-top: 64px;
      font-size: .72rem;
      color: rgba(245,240,232,.35);
      letter-spacing: .1em;
    }
  </style>
